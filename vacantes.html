<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacantes disponibles | GA Hospitality</title>
  <meta
    name="description"
    content="Consulta de vacantes filtradas por tipo, ubicación y marca."
  />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/icons8-nuevo-empleo-32.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <img src="/img/gaho.png" alt="GA Hospitality" class="corporativo-logo" />
      <div>
        <h2>GA Hospitality</h2>
        <p>Resultados de vacantes</p>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top: 32px;">
    <section class="card">
      <div class="section-head">
        <h2>Vacantes disponibles</h2>
        <p id="vacantesResumenFiltros">
          Aquí verás las vacantes encontradas según tu búsqueda.
        </p>
      </div>

      <div class="hero__actions" style="margin-top: 0;">
        <a href="/index.html#busqueda-vacantes" class="btn btn--ghost">Volver a filtros</a>
      </div>
    </section>

    <section class="card">
      <div id="vacantesStatus" class="status hidden"></div>
      <div id="vacantesResultados" class="vacantes-grid"></div>
    </section>
  </main>

  <script src="vacantes.js"></script>
</body>
</html>
